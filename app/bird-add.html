<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bird</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <form>
        <h3>Внесите данные о птице</h3>

        <div class="form-block" id="blockImages">
          <fieldset class="field-block">
            <label for="photoUrls">Загрузить фото (или ссылку)</label>
            <div class="addition-list-controls">
              <input id="photoUrls" placeholder="URL фото" type="url"
                value="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Lophophanes_cristatus_-_01.jpg/500px-Lophophanes_cristatus_-_01.jpg">
              <button id="photoUrlsBtn">+</button>
            </div>
            <input id="photoFiles" type="file" multiple>
            <div class="addition-list"></div>
          </fieldset>
        </div>

        <div class="form-block" id="blockNames">
          <fieldset>
            <legend>Названия птицы</legend>
            <div class="field-block">
              <label for="title">Название (основное)</label>
              <input id="title" value="Хохлатая синица">
            </div>

            <div class="field-block">
              <label for="nameLatin">Название (лат.)</label>
              <input id="nameLatin" lang="la" pattern="[a-z A-Z]+" required
                value="Lophophanes cristatus">
            </div>

            <div class="field-block">
              
              <label for="nameAlternatives">Альтернативные названия</label>
              <div class="addition-list-controls">
                <input id="nameAlternatives" value="Гренадерка">
                <button id="nameAlternativesBtn">+</button>
              </div>
              <div class="addition-list"></div>
            </div>
            <div class="field-block">
              <label for="nameEtymologies">Этимология названий</label>
              <div class="addition-list-controls">
                <textarea
                  id="nameEtymologies">Своё название — гренадер — получила благодаря хорошо заметному коническому хохолку, похожему на шапки гренадеров — элитных пехотинцев XVII—XVIII веков.</textarea>
                <button id="nameEtymologiesBtn">+</button>
              </div>
              <div class="addition-list"></div>
            </div>
          </fieldset>
        </div>
        <div class="form-block" id="blockFacts">
          <fieldset>
            <legend>Факты</legend>
            <div class="field-block">
              <label for="interestFacts">Интресные факты</label>
              <div class="addition-list-controls">
                <textarea id="interestFacts"></textarea>
                <button id="interestFactsBtn">+</button>
              </div>
              <div class="addition-list"></div>
            </div>
            <div class="field-block">
              <label for="statisticFacts">Статистические факты</label>
              <div class="addition-list-controls">
                <textarea
                  id="statisticFacts">В полевых условиях самцы и самки практически не отличимы.</textarea>
                <button id="statisticFactsBtn">+</button>
              </div>
              <div class="addition-list"></div>
            </div>
            <div class="field-block">
              <label for="similarSpecies">Схожести видов</label>
              <div class="addition-list-controls">
                <textarea
                  id="similarSpecies">Более других видов синиц склонна к оседлому образу жизни</textarea>
                <button id="similarSpeciesBtn">+</button>
              </div>
              <div class="addition-list"></div>
            </div>
          </fieldset>
        </div>
        <button type="submit">Проверить карточку</button>
      </form>
    </main>

    <script src="./utils/index.js"></script>
    <script src="./handlers/utils.js"></script>
    <script src="./handlers/index.js"></script>
    <script src="index.js"></script>
  </body>
</html>
